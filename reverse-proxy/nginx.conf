events {}

http {
  server {
    listen 8080;

    location / {
      proxy_pass http://web:3000;
    }

    location /api/ {
      proxy_pass http://api:8000/;
    }

    location /grafana/ {
      proxy_pass http://grafana:3000/;
    }

    location /node-red/ {
      proxy_pass http://node-red:1880/;
    }
  }
}
