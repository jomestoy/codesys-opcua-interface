services:
  web:
    image: node:22-alpine
    working_dir: /workspace/apps/web
    volumes:
      - .:/workspace
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "/api"
    command: ["sh", "-lc", "npm install && npm run dev"]

  api:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "8000:8000"
    environment:
      REAL_IO_ENABLED: "false"
      DEMO_MODE: "true"
      CODESYS_ENDPOINT_PRIMARY: "opc.tcp://codesys-a:4840"
      CODESYS_ENDPOINT_SECONDARY: "opc.tcp://codesys-b:4840"
    command: ["sh", "-lc", "python -m pip install -e . && python -m services.api.run"]

  grafana:
    image: grafana/grafana:11.1.0
    ports:
      - "3000:3000"
    environment:
      GF_SERVER_ROOT_URL: "http://localhost:8080/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GRAFANA_POSTGRES_HOST: "${GRAFANA_POSTGRES_HOST:-postgres}"
      GRAFANA_POSTGRES_PORT: "${GRAFANA_POSTGRES_PORT:-5432}"
      GRAFANA_POSTGRES_DB: "${GRAFANA_POSTGRES_DB:-columns}"
      GRAFANA_POSTGRES_USER: "${GRAFANA_POSTGRES_USER:-grafana_readonly}"
      GRAFANA_POSTGRES_PASSWORD: "${GRAFANA_POSTGRES_PASSWORD}"
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

  node-red:
    image: nodered/node-red:3.1.9
    ports:
      - "1880:1880"
    environment:
      NODE_RED_DISABLE_EDITOR: "true"
      NODE_RED_LOG_LEVEL: "info"
    volumes:
      - ./node-red:/data:ro
    command: ["node-red", "--settings", "/data/settings/settings.js"]

  reverse-proxy:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - grafana
      - node-red
