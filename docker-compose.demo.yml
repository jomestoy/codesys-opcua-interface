services:
  api:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
    ports:
      - "8000:8000"
    environment:
      REAL_IO_ENABLED: "false"
      DEMO_MODE: "true"
      CODESYS_ENDPOINT_PRIMARY: "opc.tcp://codesys-a:4840"
      CODESYS_ENDPOINT_SECONDARY: "opc.tcp://codesys-b:4840"
    command: ["sh", "-lc", "python -m pip install -e . && python -m services.api.run"]
